<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Bernhard Apps develops practical, privacy-conscious apps built around real needs, including NLP Trainer for coaches and practitioners."
    />
    <meta name="theme-color" content="#061826" />
    <meta property="og:title" content="Bernhard Apps" />
    <meta
      property="og:description"
      content="Practical apps built around real needs. Explore NLP Trainer, testing opportunities, support and privacy information."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://bernhardapps.com/" />
    <meta property="og:image" content="https://bernhardapps.com/og-image.svg" />
    <link rel="canonical" href="https://bernhardapps.com/" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <title>Bernhard Apps | Practical apps built around real needs</title>
    <style>
      :root {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #06131f;
        color: #f5f8fb;
        --bg: #06131f;
        --panel: #0b2233;
        --line: rgba(147, 197, 253, 0.18);
        --text: #f5f8fb;
        --muted: #a8b8c7;
        --teal: #5eead4;
        --blue: #7dd3fc;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-width: 320px;
        background:
          radial-gradient(circle at 18% 8%, rgba(34, 211, 194, 0.12), transparent 26rem),
          radial-gradient(circle at 82% 18%, rgba(125, 211, 252, 0.12), transparent 30rem),
          linear-gradient(180deg, #06131f 0%, #071927 46%, #06131f 100%);
      }
      a { color: inherit; }
      .site-header, .footer, .section {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
      }
      .site-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
        padding: 18px 0;
      }
      .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        color: var(--text);
        font-weight: 800;
        text-decoration: none;
      }
      .brand-mark {
        display: grid;
        place-items: center;
        width: 42px;
        height: 42px;
        border-radius: 12px;
        overflow: hidden;
        background: #f8fafc;
      }
      .brand-mark img {
        width: 130%;
        height: 130%;
        object-fit: cover;
        object-position: center 28%;
      }
      .nav {
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .nav a, .footer a, .link-row a {
        color: var(--muted);
        text-decoration: none;
      }
      .nav a {
        padding: 10px 12px;
        border-radius: 999px;
      }
      .section {
        padding: 76px 0;
      }
      .hero, .subpage-hero {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(280px, 0.85fr);
        align-items: center;
        gap: 56px;
      }
      .eyebrow {
        color: var(--teal);
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0;
        text-transform: uppercase;
      }
      h1, h2, h3, p {
        overflow-wrap: anywhere;
      }
      h1 {
        margin: 0 0 18px;
        font-size: clamp(2.4rem, 6vw, 5.4rem);
        line-height: 0.95;
      }
      h2 {
        margin: 0 0 14px;
        font-size: clamp(1.8rem, 3vw, 3rem);
      }
      p {
        color: var(--muted);
        line-height: 1.7;
      }
      .hero-toggle {
        display: inline-flex;
        gap: 8px;
        margin-top: 26px;
        padding: 6px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(6, 19, 31, 0.76);
      }
      .hero-toggle button, .button {
        border: 0;
        border-radius: 999px;
        padding: 12px 18px;
        font-weight: 800;
      }
      .hero-toggle .active, .button.primary {
        background: linear-gradient(135deg, var(--teal), var(--blue));
        color: #04202a;
      }
      .button.secondary {
        border: 1px solid var(--line);
        color: var(--text);
        background: rgba(255,255,255,0.06);
      }
      .app-icon-grid {
        display: flex;
        justify-content: center;
      }
      .app-icon-link {
        display: grid;
        place-items: center;
        width: min(260px, 66vw);
        aspect-ratio: 1;
      }
      .nlp-logo-mark, .detail-hero-image {
        display: block;
        max-width: 100%;
        height: auto;
        border-radius: 24px;
      }
      .principle-grid, .feature-detail-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 18px;
      }
      .info-card {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 22px;
        background: rgba(11, 34, 51, 0.74);
      }
      .screenshot-grid {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 12px;
      }
      .screenshot-image {
        width: 100%;
        border-radius: 8px;
      }
      .hero-actions, .link-row {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 24px;
      }
      .footer {
        padding: 36px 0 42px;
        border-top: 1px solid var(--line);
      }
      .footer-top {
        display: flex;
        justify-content: space-between;
        gap: 24px;
        flex-wrap: wrap;
      }
      .footer nav {
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
      }
      @media (max-width: 820px) {
        .hero, .subpage-hero, .principle-grid, .feature-detail-grid {
          grid-template-columns: 1fr;
        }
        .screenshot-grid {
          display: flex;
          overflow-x: auto;
        }
        .screenshot-image {
          width: 180px;
          flex: 0 0 auto;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        var root = document.getElementById("root");
        if (!root) return;

        var appDescription =
          "NLP Trainer is an app made for coaches, NLP practitioners and life coaches who want a simple way to keep track of clients, sessions, notes, planning and NLP techniques. Instead of using several different tools, NLP Trainer brings the most important parts of coaching work into one place.";

        function shell(content) {
          root.innerHTML =
            '<div class="site-shell">' +
            '<header class="site-header">' +
            '<a class="brand" href="/"><span class="brand-mark"><img src="/bernhard-apps-logo.webp" alt="" /></span><span>Bernhard Apps</span></a>' +
            '<nav class="nav" aria-label="Main navigation"><a href="/">Home</a><a href="/support">Support</a><a href="/contact">Contact</a></nav>' +
            '</header><main>' +
            content +
            '</main><footer class="footer"><div class="footer-top"><a class="brand" href="/"><span class="brand-mark"><img src="/bernhard-apps-logo.webp" alt="" /></span><span>Bernhard Apps</span></a><nav aria-label="Footer navigation"><a href="/support">Support</a><a href="/privacy-policy">Privacy Policy</a><a href="/terms-and-conditions">Terms and Conditions</a><a href="/contact">Contact</a></nav></div><p>© Bernhard Apps. All rights reserved.</p></footer></div>';
        }

        function home(mode) {
          var activeMode = mode || window.__bernhardHomeMode || "apps";
          window.__bernhardHomeMode = activeMode;
          var appsActive = activeMode === "apps";
          var iconContent = appsActive
            ? '<a class="app-icon-link" href="/nlp-trainer"><img class="nlp-logo-mark" src="/nlp-trainer-icon.webp" alt="NLP Trainer" /></a>'
            : '<div class="development-example" aria-label="Example app placeholder">Example</div>';
          var sectionTitle = appsActive ? "Development Principles" : "In Development";

          shell(
            '<section class="hero section"><div class="hero-content"><p class="eyebrow">Independent Android app development</p><div class="hero-toggle" aria-label="Homepage section shortcuts"><button class="' +
              (appsActive ? "active" : "") +
              '" type="button" aria-pressed="' +
              appsActive +
              '" data-home-toggle="apps">Our Apps</button><button class="' +
              (!appsActive ? "active" : "") +
              '" type="button" aria-pressed="' +
              !appsActive +
              '" data-home-toggle="development">In Development</button></div></div></section>' +
              '<section class="section app-logo-section"><div class="app-icon-grid">' +
              iconContent +
              "</div></section>" +
              '<section class="section"><div class="section-header"><h2>' +
              sectionTitle +
              '</h2></div><div class="principle-grid"><div class="info-card"><h3>Practical</h3><p>Every app should solve a real and identifiable problem.</p></div><div class="info-card"><h3>Easy to use</h3><p>Important features should be easy to find and understand.</p></div><div class="info-card"><h3>Honest development</h3><p>Apps in development, testing and public release should be clearly identified.</p></div><div class="info-card"><h3>Built with feedback</h3><p>Real user feedback should influence how products are improved.</p></div></div></section>'
          );
        }

        function nlpTrainer() {
          shell(
            '<section class="section subpage-hero"><div><p class="eyebrow">Available on Google Play</p><h1>NLP Trainer</h1><p>' +
              appDescription +
              '</p><div class="hero-actions"><a class="button primary" href="https://play.google.com/store/apps/details?id=com.bernhard.nlptrainer" target="_blank" rel="noreferrer">Google Play</a><a class="button secondary" href="/support">Support</a></div></div><div class="app-detail-media"><img class="detail-hero-image" src="/nlp-trainer-hero.webp" alt="NLP Trainer promotional graphic" /></div></section>' +
              '<section class="section app-gallery-section"><div class="section-header"><h2>Screenshots and app details</h2><p>NLP Trainer is designed for people who want a clear, structured and practical tool for coaching work.</p></div><div class="screenshot-grid"><img class="screenshot-image" src="/nlp-trainer-screenshot-1.webp" alt="NLP Trainer screenshot 1" /><img class="screenshot-image" src="/nlp-trainer-screenshot-2.webp" alt="NLP Trainer screenshot 2" /><img class="screenshot-image" src="/nlp-trainer-screenshot-3.webp" alt="NLP Trainer screenshot 3" /><img class="screenshot-image" src="/nlp-trainer-screenshot-4.webp" alt="NLP Trainer screenshot 4" /><img class="screenshot-image" src="/nlp-trainer-screenshot-5.webp" alt="NLP Trainer screenshot 5" /></div></section>' +
              '<section class="section"><div class="section-header"><h2>What you can do with NLP Trainer</h2><p>Simple. Practical. Structured.</p></div><div class="feature-detail-grid"><article class="info-card"><h3>Manage clients</h3><p>Create client profiles with contact information, notes and session history.</p></article><article class="info-card"><h3>Write session notes</h3><p>Add notes from each session, including problem, action, result, session type, price and techniques used.</p></article><article class="info-card"><h3>Use the planner</h3><p>Plan upcoming sessions, courses and appointments in a simple calendar view.</p></article><article class="info-card"><h3>Local storage</h3><p>Your client information and notes are stored locally on your device.</p></article></div><div class="link-row"><a href="/nlp-trainer/privacy-policy">NLP Trainer Privacy Policy</a><a href="/support">Support</a></div></section>'
          );
        }

        function privacy() {
          shell(
            '<section class="section legal-page"><h1>Privacy Policy for NLP Trainer</h1><p>Last updated: July 10, 2026</p><p>NLP Trainer is designed as a local-first app for coaching administration, NLP training material, client notes, planning, invoices, credit notes, backups and accounting export.</p><p>NLP Trainer does not require a server login and does not upload client data, session notes, planner data, technique notes, invoice documents, credit notes, accounting exports, backups or settings to an app-owned server.</p><h2>Data Stored Locally</h2><p>The app may store personal data and business data that you enter, including client names, phone numbers, email addresses, addresses, client notes, session topics and session notes, selected techniques, payment status and payment dates, planned appointments and calendar events, class and participant information, invoice and credit note information, business details and app settings.</p><p>This data is stored locally on your device unless you choose to export, share or back it up.</p><h2>Backups and Exports</h2><p>Android system backup is disabled for the app database.</p><p>Manual backups, invoice PDF archives, credit note PDF archives, accounting CSV files, emails, SMS messages, calendar files and exported documents are only created when you choose to create, save, export or share them.</p><p>Backup files and exported invoice or credit note archives may contain client information, session notes, planner entries, classes, participants, invoice settings, invoice documents, credit note documents, business details and local app settings.</p><p>These exported files are not encrypted by NLP Trainer. You are responsible for storing them securely.</p><h2>Sharing With Other Apps</h2><p>When you export, restore, open or share data, the destination app or provider you choose may process that data under its own privacy practices. This may include email apps, SMS apps, PDF viewers, cloud storage providers, calendar apps, accounting software, file pickers and local storage providers.</p><p>NLP Trainer does not control how those third-party apps or services process the data after you choose to share or export it.</p><h2>User Responsibility</h2><p>You are responsible for protecting client information, obtaining any required consent, using a valid legal basis for processing personal data, limiting access to exported files, and complying with privacy, confidentiality, retention, accounting record, tax record and deletion rules that apply to your practice or business.</p><h2>Deleting Data</h2><p>If you no longer want app data on your device, you can delete the relevant clients, sessions, planner entries, classes, events, invoice files, credit note files and backups, or uninstall the app.</p><p>Files already exported to other apps, cloud providers, email accounts, accounting systems or local folders must be managed separately in those services.</p><h2>Children&apos;s Privacy</h2><p>NLP Trainer is intended for professional or business use. The app is not directed at children.</p><h2>Contact</h2><p>For privacy questions or feedback, contact: <a href="mailto:contact@bernhardapps.com">contact@bernhardapps.com</a></p></section>'
          );
        }

        function simplePage(title, text) {
          shell('<section class="section legal-page"><h1>' + title + "</h1><p>" + text + '</p><p><a href="mailto:contact@bernhardapps.com">contact@bernhardapps.com</a></p></section>');
        }

        function supportPage() {
          shell('<section class="section legal-page"><h1>Support for NLP Trainer</h1><p>Find help, request improvements or report issues about NLP Trainer.</p><p>Support email: <a href="mailto:support@bernhardapps.com">support@bernhardapps.com</a></p></section>');
        }

        function renderFallback() {
          if (location.hash.startsWith("#/")) {
            history.replaceState(null, "", location.hash.replace(/^#/, "") || "/");
          }
          var route = location.pathname || "/";
          window.scrollTo(0, 0);
          if (route === "/nlp-trainer") return nlpTrainer();
          if (route === "/nlp-trainer/privacy-policy") return privacy();
          if (route === "/support") return supportPage();
          if (route === "/contact") return simplePage("Contact Bernhard Apps", "For privacy questions, tester interest or general inquiries, contact Bernhard Apps directly.");
          if (route === "/privacy-policy") return simplePage("Privacy Policy", "Bernhard Apps aims to build privacy-conscious applications that only ask for information needed to provide their intended functionality.");
          if (route === "/terms-and-conditions") return simplePage("Terms and Conditions", "Bernhard Apps provides software intended to support practical workflows.");
          return home();
        }

        renderFallback();
        window.addEventListener("popstate", renderFallback);
        root.addEventListener("click", function (event) {
          var target = event.target;
          if (!target || !target.dataset || !target.dataset.homeToggle) return;
          window.__bernhardHomeMode = target.dataset.homeToggle;
          home(window.__bernhardHomeMode);
        });
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
